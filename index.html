<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sporting CIC — Ranking</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap');

    :root {
      --bg:       #0d0820;
      --surface:  #1a1035;
      --card:     #221545;
      --purple:   #4a2fa0;
      --purple2:  #6b46c1;
      --white:    #ffffff;
      --silver:   #b0aac8;
      --gold:     #ffd700;
      --silver2:  #c0c0c0;
      --bronze:   #cd7f32;
      --green:    #22c55e;
      --border:   rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────── */
    header {
      background: linear-gradient(160deg, #2d1b69 0%, #0d0820 60%);
      border-bottom: 2px solid var(--purple);
      padding: 28px 24px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(107,70,193,0.3) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .shield {
      width: 72px;
      height: 84px;
      flex-shrink: 0;
    }
    .club-name {
      text-align: center;
    }
    .club-name h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      line-height: 1;
      letter-spacing: 4px;
      color: var(--white);
      text-shadow: 0 0 30px rgba(107,70,193,0.8);
    }
    .club-name p {
      font-size: 0.72rem;
      color: var(--silver);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── FILTERS ────────────────────────── */
    .filters {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }
    .filter-label {
      font-size: 0.75rem;
      color: var(--silver);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-right: 4px;
    }
    .quick-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .qbtn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--silver);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .5px;
    }
    .qbtn:hover, .qbtn.active {
      background: var(--purple);
      border-color: var(--purple2);
      color: var(--white);
    }
    .date-inputs {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .date-inputs input[type="date"] {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--white);
      font-size: 0.8rem;
      padding: 6px 10px;
      border-radius: 8px;
      outline: none;
      cursor: pointer;
    }
    .date-inputs input[type="date"]:focus {
      border-color: var(--purple2);
    }
    .date-sep { color: var(--silver); font-size: 0.8rem; }

    /* ── MAIN ───────────────────────────── */
    main { max-width: 680px; margin: 0 auto; padding: 24px 16px 48px; }

    /* stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
    }
    .stat-card .val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--white);
      line-height: 1;
    }
    .stat-card .lbl {
      font-size: 0.65rem;
      color: var(--silver);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* section title */
    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--silver);
      margin-bottom: 12px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── PODIUM ─────────────────────────── */
    .podium {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .podium-item {
      flex: 1;
      max-width: 160px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .podium-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 8px;
      border: 3px solid;
      position: relative;
    }
    .podium-item:nth-child(1) .podium-avatar { border-color: var(--silver2); background: rgba(192,192,192,0.1); color: var(--silver2); }
    .podium-item:nth-child(2) .podium-avatar { border-color: var(--gold); background: rgba(255,215,0,0.1); color: var(--gold); width: 68px; height: 68px; font-size: 1.8rem; }
    .podium-item:nth-child(3) .podium-avatar { border-color: var(--bronze); background: rgba(205,127,50,0.1); color: var(--bronze); }
    .podium-name {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .podium-pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--silver);
    }
    .podium-item:nth-child(2) .podium-pts { font-size: 1.7rem; color: var(--gold); }
    .podium-block {
      width: 100%;
      border-radius: 8px 8px 0 0;
      margin-top: 6px;
    }
    .podium-item:nth-child(1) .podium-block { height: 50px; background: linear-gradient(180deg, rgba(192,192,192,0.3), rgba(192,192,192,0.1)); }
    .podium-item:nth-child(2) .podium-block { height: 80px; background: linear-gradient(180deg, rgba(255,215,0,0.4), rgba(255,215,0,0.1)); }
    .podium-item:nth-child(3) .podium-block { height: 34px; background: linear-gradient(180deg, rgba(205,127,50,0.3), rgba(205,127,50,0.1)); }
    .crown { font-size: 1.2rem; margin-bottom: 2px; }

    /* ── RANKING TABLE ──────────────────── */
    .ranking-list { display: flex; flex-direction: column; gap: 8px; }
    .rank-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: transform .15s, border-color .15s;
    }
    .rank-item:hover { transform: translateX(3px); border-color: rgba(107,70,193,0.4); }
    .rank-item.top1 { border-color: rgba(255,215,0,0.4); background: linear-gradient(90deg, rgba(255,215,0,0.05), var(--surface)); }
    .rank-item.top2 { border-color: rgba(192,192,192,0.3); }
    .rank-item.top3 { border-color: rgba(205,127,50,0.3); }

    .rank-pos {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      width: 32px;
      text-align: center;
      flex-shrink: 0;
      color: var(--silver);
    }
    .rank-item.top1 .rank-pos { color: var(--gold); }
    .rank-item.top2 .rank-pos { color: var(--silver2); }
    .rank-item.top3 .rank-pos { color: var(--bronze); }

    .rank-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--purple);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .rank-item.top1 .rank-avatar { background: linear-gradient(135deg, #b8860b, #ffd700); color: #000; }

    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-size: 1rem; font-weight: 700; }
    .rank-sub  { font-size: 0.72rem; color: var(--silver); margin-top: 2px; }

    .rank-pts {
      text-align: right;
      flex-shrink: 0;
    }
    .rank-pts .pts-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      line-height: 1;
      color: var(--white);
    }
    .rank-item.top1 .pts-val { color: var(--gold); }
    .rank-pts .pts-lbl {
      font-size: 0.6rem;
      color: var(--silver);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .bar-wrap { margin-top: 6px; background: var(--card); border-radius: 4px; height: 4px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 4px; background: var(--purple2); transition: width .6s ease; }
    .rank-item.top1 .bar-fill { background: linear-gradient(90deg, var(--gold), #ffa500); }

    /* ── EMPTY / LOADING ────────────────── */
    .center-msg {
      text-align: center;
      padding: 48px 0;
      color: var(--silver);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--purple2);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ─────────────────────────── */
    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    @media (max-width: 400px) {
      .club-name h1 { font-size: 2rem; }
      .podium-item { max-width: 110px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-wrap">
    <svg class="shield" viewBox="0 0 64 74" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- star -->
      <polygon points="32,2 33.8,7.5 39.5,7.5 34.9,10.8 36.7,16.3 32,13 27.3,16.3 29.1,10.8 24.5,7.5 30.2,7.5" fill="white"/>
      <!-- shield body -->
      <path d="M8 18 L8 44 Q8 62 32 70 Q56 62 56 44 L56 18 Z" fill="#2d1b69" stroke="white" stroke-width="2.5"/>
      <!-- inner shield border -->
      <path d="M13 22 L13 43 Q13 57 32 64 Q51 57 51 43 L51 22 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <!-- 3 stripes -->
      <rect x="18" y="38" width="8" height="22" rx="1" fill="white" opacity="0.9"/>
      <rect x="28" y="38" width="8" height="22" rx="1" fill="white" opacity="0.9"/>
      <rect x="38" y="38" width="8" height="22" rx="1" fill="white" opacity="0.9"/>
      <!-- clip stripes inside shield -->
      <path d="M13 43 Q13 57 32 64 Q51 57 51 43 L51 38 L13 38 Z" fill="#2d1b69"/>
      <path d="M13 43 Q13 57 32 64 Q51 57 51 43 L51 38 L13 38 Z" fill="none"/>
      <!-- re-draw stripes clipped -->
      <clipPath id="shield-clip">
        <path d="M13 22 L13 43 Q13 57 32 64 Q51 57 51 43 L51 22 Z"/>
      </clipPath>
      <rect x="18" y="36" width="8" height="32" fill="white" opacity="0.9" clip-path="url(#shield-clip)"/>
      <rect x="28" y="36" width="8" height="32" fill="white" opacity="0.9" clip-path="url(#shield-clip)"/>
      <rect x="38" y="36" width="8" height="32" fill="white" opacity="0.9" clip-path="url(#shield-clip)"/>
    </svg>
    <div class="club-name">
      <h1>Sporting CIC</h1>
      <p>⚽ Ranking de Desempenho</p>
    </div>
  </div>
</header>

<!-- FILTERS -->
<div class="filters">
  <span class="filter-label">📅 Período</span>
  <div class="quick-btns">
    <button class="qbtn active" onclick="setQuick('all', this)">Tudo</button>
    <button class="qbtn" onclick="setQuick('today', this)">Hoje</button>
    <button class="qbtn" onclick="setQuick('month', this)">Este mês</button>
    <button class="qbtn" onclick="setQuick('last', this)">Mês anterior</button>
  </div>
  <div class="date-inputs">
    <input type="date" id="dateFrom" onchange="applyCustomDate()" />
    <span class="date-sep">→</span>
    <input type="date" id="dateTo" onchange="applyCustomDate()" />
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="stats-bar">
    <div class="stat-card">
      <div class="val" id="stat-jogos">—</div>
      <div class="lbl">Jogos</div>
    </div>
    <div class="stat-card">
      <div class="val" id="stat-votos">—</div>
      <div class="lbl">Votos</div>
    </div>
    <div class="stat-card">
      <div class="val" id="stat-lider">—</div>
      <div class="lbl">Líder atual</div>
    </div>
  </div>

  <div class="section-title">🏅 Pódio</div>
  <div class="podium" id="podium"></div>

  <div class="section-title">📊 Ranking completo</div>
  <div class="ranking-list" id="ranking"></div>
</main>

<footer>Sporting CIC &mdash; Sistema de Premiação por Desempenho</footer>

<script>
  const TOKEN   = 'patgBozsUliw8KNne.e3eab974dca822ccd024eb6cb2ccfccdd18aa917e0e8c0c6fbdbb419334e3ef7';
  const BASE_ID = 'appoTtZSOgrcEIsA1';
  const TABLE_ID= 'tblRtfPOsi2zmUtCZ';
  // Campos que NÃO são jogadores — adicione aqui se criar outros campos no Airtable
  const NON_PLAYER_FIELDS = new Set(['Quem votou', 'Data do voto']);

  // Detecta dinamicamente os jogadores a partir dos campos numéricos dos registros
  function detectPlayers(records) {
    const found = new Set();
    records.forEach(r => {
      Object.entries(r.fields).forEach(([key, val]) => {
        if (!NON_PLAYER_FIELDS.has(key) && typeof val === 'number') {
          found.add(key);
        }
      });
    });
    return [...found].sort();
  }

  let allRecords = [];
  let dateFrom = null;
  let dateTo   = null;

  // ── Fetch all records (with pagination) ──
  async function fetchAll() {
    showLoading();
    let records = [];
    let offset  = null;
    try {
      do {
        let url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?pageSize=100`;
        if (offset) url += `&offset=${offset}`;
        const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        records = records.concat(data.records);
        offset  = data.offset || null;
      } while (offset);
      allRecords = records;
      render();
    } catch(e) {
      document.getElementById('ranking').innerHTML =
        `<div class="center-msg">⚠️ Erro ao carregar dados.<br><small>${e.message}</small></div>`;
    }
  }

  function showLoading() {
    document.getElementById('ranking').innerHTML =
      `<div class="center-msg"><div class="spinner"></div>Carregando votos...</div>`;
    document.getElementById('podium').innerHTML = '';
  }

  // ── Quick date filters ──
  function setQuick(mode, btn) {
    document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value   = '';
    const now   = new Date();
    if (mode === 'all')   { dateFrom = null; dateTo = null; }
    if (mode === 'today') {
      dateFrom = toYMD(now); dateTo = toYMD(now);
    }
    if (mode === 'month') {
      dateFrom = `${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;
      dateTo   = toYMD(now);
    }
    if (mode === 'last') {
      const d = new Date(now.getFullYear(), now.getMonth()-1, 1);
      const e = new Date(now.getFullYear(), now.getMonth(), 0);
      dateFrom = toYMD(d); dateTo = toYMD(e);
    }
    render();
  }

  function applyCustomDate() {
    document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('active'));
    dateFrom = document.getElementById('dateFrom').value || null;
    dateTo   = document.getElementById('dateTo').value   || null;
    render();
  }

  function toYMD(d) {
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
  function pad(n) { return String(n).padStart(2,'0'); }

  // ── Filter records by date (converts UTC to local date) ──
  function rawToLocalYMD(raw) {
    if (!raw) return null;
    const d = new Date(raw);
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
  function filtered() {
    return allRecords.filter(r => {
      const raw = r.fields['Data do voto'];
      if (!raw) return true;
      const day = rawToLocalYMD(raw);
      if (dateFrom && day < dateFrom) return false;
      if (dateTo   && day > dateTo)   return false;
      return true;
    });
  }

  // ── Render ──
  function render() {
    const recs = filtered();

    // Count unique game dates
    const days = new Set(recs.map(r => rawToLocalYMD(r.fields['Data do voto'])).filter(Boolean));

    // Detecta jogadores dinamicamente a partir de todos os registros (não só os filtrados)
    const PLAYERS = detectPlayers(allRecords);

    // Sum scores per player
    const totals = {};
    const counts = {};
    PLAYERS.forEach(p => { totals[p] = 0; counts[p] = 0; });

    recs.forEach(r => {
      PLAYERS.forEach(p => {
        const val = r.fields[p];
        if (val != null && val > 0) {
          totals[p] += val;
          counts[p]++;
        }
      });
    });

    // Sort
    const sorted = PLAYERS
      .map(p => ({ name: p, pts: totals[p], votes: counts[p], avg: counts[p] ? (totals[p]/counts[p]).toFixed(1) : '—' }))
      .sort((a,b) => b.pts - a.pts);

    const maxPts = sorted[0]?.pts || 1;

    // Stats bar
    document.getElementById('stat-jogos').textContent = days.size || '0';
    document.getElementById('stat-votos').textContent = recs.length;
    document.getElementById('stat-lider').textContent = sorted[0]?.pts > 0 ? sorted[0].name.slice(0,4) : '—';

    // Podium (top 3, order: 2nd | 1st | 3rd)
    if (sorted.length >= 3 && sorted[0].pts > 0) {
      const [first, second, third] = sorted;
      const podiumOrder = [second, first, third];
      const idx         = [1, 0, 2];
      document.getElementById('podium').innerHTML = podiumOrder.map((p, i) => {
        const pos = idx[i];
        const medals = ['🥇','🥈','🥉'];
        const crown  = pos === 0 ? '<div class="crown">👑</div>' : '';
        return `
          <div class="podium-item">
            ${crown}
            <div class="podium-avatar">${p.name[0]}</div>
            <div class="podium-name">${p.name}</div>
            <div class="podium-pts">${p.pts}</div>
            <div class="podium-block"></div>
          </div>`;
      }).join('');
    } else {
      document.getElementById('podium').innerHTML =
        `<div class="center-msg" style="width:100%">Sem dados suficientes para o pódio.</div>`;
    }

    // Ranking list
    if (recs.length === 0) {
      document.getElementById('ranking').innerHTML =
        `<div class="center-msg">⚽ Nenhum voto encontrado para o período selecionado.</div>`;
      return;
    }

    document.getElementById('ranking').innerHTML = sorted.map((p, i) => {
      const pos   = i + 1;
      const cls   = pos === 1 ? 'top1' : pos === 2 ? 'top2' : pos === 3 ? 'top3' : '';
      const emoji = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : '';
      const pct   = maxPts > 0 ? Math.round((p.pts / maxPts) * 100) : 0;
      return `
        <div class="rank-item ${cls}">
          <div class="rank-pos">${emoji || pos}</div>
          <div class="rank-avatar">${p.name[0]}</div>
          <div class="rank-info">
            <div class="rank-name">${p.name}</div>
            <div class="rank-sub">${p.votes} votos recebidos &bull; média ${p.avg}</div>
            <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="rank-pts">
            <div class="pts-val">${p.pts}</div>
            <div class="pts-lbl">pts</div>
          </div>
        </div>`;
    }).join('');
  }

  fetchAll();
</script>
</body>
</html>
